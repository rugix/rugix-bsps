parent = "core/debian-bookworm"

recipes = [
    # Install BSP artifacts (kernel, DTBs, modules, boot script, rugix-ctrl config).
    "bsp-setup",
    # Install and configure Rugix Ctrl.
    "core/rugix-ctrl",
    # Set a static hostname.
    "core/set-hostname",
    # Persist `/root`.
    "core/persist-root-home",
    # Setup and enable SSH.
    "core/ssh",
    # Setup the network.
    "rugix-extra/debian-setup-network",
    # Enable discovery of the system in the local network.
    "rugix-extra/avahi",
    # Allow passwordless root login on serial console.
    "enable-root-login",
]

[parameters."core/set-hostname"]
hostname = "imx91-frdm"

[parameters."core/ssh"]
root_authorized_keys = """
<INSERT YOUR PUBLIC SSH KEY HERE>
"""
